<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Редактор сеансу — ціни та зони</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  font-family: system-ui, -apple-system, Segoe UI, sans-serif;
  background:#f3f4f6;
  margin:0;
  padding:20px;
}
.wrap{max-width:980px;margin:auto;}
h1{margin-bottom:6px}
.card{
  background:#fff;
  border-radius:12px;
  padding:16px;
  margin-bottom:16px;
  box-shadow:0 4px 14px rgba(0,0,0,.08);
}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
label{font-size:14px}
input,select,button,textarea{
  padding:8px 10px;
  font-size:14px;
}
button{cursor:pointer}
textarea{
  width:100%;
  height:260px;
  font-family:monospace;
}
.badge{
  font-size:12px;
  padding:2px 8px;
  border-radius:6px;
  background:#e5e7eb;
  display:inline-block;
}
.rule-row{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:6px;
  font-size:14px;
}
small{color:#6b7280}
.new-btn{
  background:#16a34a;
  color:#fff;
  border:none;
  border-radius:8px;
  font-weight:700;
}
</style>
</head>

<body>
<div class="wrap">

<h1>🎛️ Редактор seance.json</h1>
<span class="badge">Ціни + кольори + окремі місця (один сеанс)</span>

<!-- Seance -->
<div class="card">
  <div class="row">
    <label>Seance ID</label>
    <input id="seanceId" placeholder="koncert-2026-02-10-19-00" style="flex:1">
    <button onclick="loadSeance()">Завантажити</button>
    <button class="new-btn" onclick="createNewSeance()">➕ Новий сеанс</button>
  </div>
</div>

<!-- Rules -->
<div class="card">
  <h3>➕ Правило по рядах</h3>

  <div class="row">
    <label>Зона</label>
    <select id="zone">
      <option value="P">Партер</option>
      <option value="A">Амфітеатр</option>
      <option value="B">Балкон</option>
    </select>

    <label>Ряди</label>
    <input id="fromRow" type="number" placeholder="від">
    <input id="toRow" type="number" placeholder="до">

    <label>Ціна</label>
    <input id="price" type="number" placeholder="200">

    <label>Колір</label>
    <input id="color" type="color" value="#9333ea">

    <label>
      <input type="checkbox" id="sale" checked>
      Продається
    </label>

    <button onclick="addRule()">Додати</button>
  </div>

  <small>Можна додавати скільки завгодно правил — всі працюють одночасно</small>
</div>

<!-- Rules list -->
<div class="card">
  <h3>📋 Правила цього сеансу</h3>
  <div id="rulesList"></div>
</div>

<!-- Seat override -->
<div class="card">
  <h3>🎯 Окреме місце</h3>
  <div class="row">
    <input id="seatKey" placeholder="P3-M5">
    <input id="seatPrice" type="number" placeholder="ціна">
    <input id="seatColor" type="color" value="#ef4444">
    <label>
      <input type="checkbox" id="seatSale">
      Заборонити продаж
    </label>
    <button onclick="addSeatOverride()">Додати</button>
  </div>
</div>

<!-- JSON -->
<div class="card">
  <h3>📄 seance.json</h3>
  <textarea id="output"></textarea>
  <button onclick="copy()">📋 Скопіювати</button>
</div>

<button id="publish">🚀 Опублікувати</button>

</div>

<script>
const SUPABASE_URL = "https://fhusjlkneckbvnrdhbil.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_nCCfptJOb8Lzy1uAwGBJzA_OJtDneTS";
const SUPABASE_FUNCTION_URL =
  "https://fhusjlkneckbvnrdhbil.supabase.co/functions/v1/save-seance";

const data = {
  pricing: {},
  seat_overrides: {}
};

function createNewSeance(){
  const show = prompt("Назва show:", "koncert");
  if(!show) return;

  const date = prompt("Дата YYYY-MM-DD:", "2026-02-15");
  if(!date) return;

  const time = prompt("Час HH-MM:", "18-00");
  if(!time) return;

  const id = `${show}-${date}-${time}`;

  seanceId.value = id;

  data.pricing = {};
  data.seat_overrides = {};
  render();

  alert(
    "Створено новий сеанс:\n\n" +
    id +
    "\n\nПісля налаштування натисніть 'Опублікувати'."
  );
}

function addRule(){
  const z = zone.value;
  const from = Number(fromRow.value);
  const to   = Number(toRow.value);
  const p    = Number(price.value);
  const c    = color.value;
  const saleAllowed = sale.checked;

  if (!z || !from || !to || !p) {
    alert("Вкажи зону, ряди і ціну");
    return;
  }

  const key = `${z}${from}-${to}`;

  data.pricing[key] = {
    price: p,
    color: c,
    sale: saleAllowed
  };

  render();
}

function addSeatOverride(){
  const key = seatKey.value.trim();
  if(!key) return;

  const obj = {};
  if(seatPrice.value) obj.price = Number(seatPrice.value);
  obj.color = seatColor.value;
  if(seatSale.checked) obj.sale = false;

  data.seat_overrides[key] = obj;
  render();
}

function render(){
  output.value = JSON.stringify({
    seance_id: seanceId.value.trim(),
    pricing: data.pricing,
    seat_overrides: data.seat_overrides
  }, null, 2);

  rulesList.innerHTML = Object.entries(data.pricing).map(([k,r])=>`
    <div class="rule-row">
      <b>${k}</b>
      <span>${r.price} грн</span>
      <span>${r.sale === false ? "❌" : "✔"}</span>
    </div>
  `).join("") || "<small>Поки що правил немає</small>";
}

function copy(){
  output.select();
  document.execCommand("copy");
  alert("Скопійовано");
}

publish.onclick = async () => {
  const seance = seanceId.value.trim();
  if (!seance) return alert("Вкажи Seance ID");

  try {

    // 1️⃣ Добавляем / обновляем запись в таблице seances
    const seanceRes = await fetch(
      `${SUPABASE_URL}/rest/v1/seances`,
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          apikey: SUPABASE_ANON_KEY,
          Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
          Prefer: "resolution=merge-duplicates"
        },
        body: JSON.stringify({
          id: seance,
          show: "test",
          date: null,
          time: null,
          active: true
        })
      }
    );

    if (!seanceRes.ok) {
      const text = await seanceRes.text();
      alert("❌ Помилка запису в seances:\n" + text);
      return;
    }

    // 2️⃣ Публикуем pricing через Edge Function
    const pricingRes = await fetch(SUPABASE_FUNCTION_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        seance_id: seance,
        pricing: data.pricing,
        seat_overrides: data.seat_overrides
      })
    });

    if (!pricingRes.ok) {
      const text = await pricingRes.text();
      alert("❌ Помилка pricing:\n" + text);
      return;
    }

    alert("✅ Сеанс створено та опубліковано");

  } catch (err) {
    alert("❌ Помилка: " + err.message);
  }
};


async function loadSeance(){
  const seance = seanceId.value.trim();
  if(!seance) return;

  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/seances_pricing?seance_id=eq.${encodeURIComponent(seance)}&select=pricing,seat_overrides`,
    { headers:{ apikey:SUPABASE_ANON_KEY, Authorization:`Bearer ${SUPABASE_ANON_KEY}` } }
  );

  const rows = await res.json();
  if(!rows.length) return alert("Не знайдено");

  data.pricing = rows[0].pricing || {};
  data.seat_overrides = rows[0].seat_overrides || {};
  render();
}
</script>
</body>
</html>
